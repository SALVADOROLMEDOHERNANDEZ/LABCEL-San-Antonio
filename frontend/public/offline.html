<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin Conexión - LABCEL San Antonio</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0A0A0F;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      background: linear-gradient(135deg, #00FF88, #00D4FF);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
    }
    .icon svg {
      width: 60px;
      height: 60px;
      fill: #0A0A0F;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }
    h1 {
      font-size: 24px;
      margin-bottom: 15px;
      color: #00FF88;
    }
    p {
      color: #888;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      padding: 15px 30px;
      background: linear-gradient(135deg, #00FF88, #00D4FF);
      color: #0A0A0F;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 14c0-1.3-.4-2.5-1.1-3.5L21.5 9c.3.6.5 1.3.5 2 0 2.2-1.8 4-4 4h-3v2h3c3.3 0 6-2.7 6-6zM3.9 12c0-2.2 1.8-4 4-4h3V6h-3C4.6 6 2 8.7 2 12c0 1.3.4 2.5 1.1 3.5L1.6 17l1.4 1.4 16-16L17.6 1l-2.1 2.1C14.5 2.4 13.3 2 12 2 8.1 2 5 5.1 5 9v1H3c-.6 0-1 .4-1 1v2c0 .6.4 1 1 1h2v-2zM7.9 12c0-.6.4-1 1-1h3.2l-2 2H8.9c-.6 0-1-.4-1-1zm8.2 0l1.9-1.9c.1.3.1.6.1.9 0 .6-.4 1-1 1h-1z"/>
      </svg>
    </div>
    <h1>Sin Conexión</h1>
    <p>
      Parece que no tienes conexión a internet. 
      Verifica tu conexión y vuelve a intentarlo.
    </p>
    <a href="/" class="btn" onclick="window.location.reload(); return false;">
      Reintentar
    </a>
  </div>
</body>
</html>
